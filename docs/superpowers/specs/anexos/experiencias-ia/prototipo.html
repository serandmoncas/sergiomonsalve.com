<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Experiencias IA — Grupo de estudio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,800&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{
  --tinta:#141b1f;
  --tinta-2:#3d4a52;
  --papel:#e9e5db;
  --papel-2:#dfd9cc;
  --cuero:#8a4b2a;
  --cuero-claro:#c26a3c;
  --latón:#b08d3f;
  --linea:rgba(20,27,31,.16);
  --linea-fuerte:rgba(20,27,31,.4);
  --verde:#3f6b4e;

  --display:'Bricolage Grotesque',system-ui,sans-serif;
  --serif:'Newsreader',Georgia,serif;
  --mono:'JetBrains Mono',ui-monospace,monospace;

  --max:1180px;
}

*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
@media (prefers-reduced-motion:reduce){html{scroll-behavior:auto}*{animation:none!important;transition:none!important}}

body{
  font-family:var(--serif);
  background:var(--papel);
  color:var(--tinta);
  font-size:17px;
  line-height:1.62;
  -webkit-font-smoothing:antialiased;
  background-image:
    linear-gradient(var(--linea) 1px,transparent 1px),
    linear-gradient(90deg,var(--linea) 1px,transparent 1px);
  background-size:100% 34px,34px 100%;
  background-attachment:fixed;
  background-blend-mode:multiply;
}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse at 50% 0%,rgba(233,229,219,0) 40%,rgba(233,229,219,.85) 100%);
}
.wrap{max-width:var(--max);margin:0 auto;padding:0 28px;position:relative;z-index:1}

/* ---------- NAV ---------- */
header.top{
  position:sticky;top:0;z-index:50;
  background:rgba(233,229,219,.93);
  backdrop-filter:blur(10px);
  border-bottom:1.5px solid var(--tinta);
}
.top-in{max-width:var(--max);margin:0 auto;padding:0 28px;display:flex;align-items:center;justify-content:space-between;gap:20px;min-height:62px;flex-wrap:wrap}
.brand{display:flex;align-items:baseline;gap:10px;cursor:pointer;user-select:none}
.brand b{font-family:var(--display);font-weight:800;font-size:19px;letter-spacing:-.03em}
.brand span{font-family:var(--mono);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--tinta-2)}
nav{display:flex;gap:2px;flex-wrap:wrap}
nav button{
  font-family:var(--mono);font-size:11px;letter-spacing:.09em;text-transform:uppercase;
  background:none;border:none;padding:8px 11px;cursor:pointer;color:var(--tinta-2);
  border-bottom:2px solid transparent;transition:.15s;
}
nav button:hover{color:var(--tinta);background:rgba(20,27,31,.05)}
nav button.on{color:var(--cuero);border-bottom-color:var(--cuero);font-weight:600}
nav button:focus-visible,a:focus-visible,button:focus-visible{outline:2px solid var(--cuero);outline-offset:2px}

/* ---------- ESTRUCTURA ---------- */
.view{display:none;padding:52px 0 90px;animation:fade .32s ease}
.view.on{display:block}
@keyframes fade{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:none}}

.eyebrow{font-family:var(--mono);font-size:10.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--cuero);margin-bottom:14px;display:flex;align-items:center;gap:10px}
.eyebrow::after{content:'';flex:1;height:1px;background:var(--linea-fuerte)}
h1{font-family:var(--display);font-weight:800;font-size:clamp(38px,7vw,74px);line-height:.96;letter-spacing:-.038em;margin-bottom:20px}
h2{font-family:var(--display);font-weight:600;font-size:clamp(25px,3.6vw,36px);line-height:1.1;letter-spacing:-.028em;margin-bottom:16px}
h3{font-family:var(--display);font-weight:600;font-size:20px;letter-spacing:-.018em;margin-bottom:8px}
p+p{margin-top:14px}
.lead{font-size:20px;line-height:1.55;max-width:60ch;color:var(--tinta-2)}

/* ---------- HERO ---------- */
.hero{padding:66px 0 40px;border-bottom:1.5px solid var(--tinta)}
.hero-grid{display:grid;grid-template-columns:1.25fr .75fr;gap:56px;align-items:end}
@media(max-width:860px){.hero-grid{grid-template-columns:1fr;gap:34px}}
.lema{font-family:var(--serif);font-style:italic;font-size:22px;line-height:1.4;border-left:3px solid var(--cuero);padding-left:18px;margin:24px 0;max-width:44ch}
.meta-list{font-family:var(--mono);font-size:12px;line-height:2.1;border-top:1.5px solid var(--tinta);padding-top:14px}
.meta-list div{display:flex;justify-content:space-between;gap:14px;border-bottom:1px dotted var(--linea-fuerte);padding:3px 0}
.meta-list span:first-child{color:var(--tinta-2);text-transform:uppercase;letter-spacing:.08em;font-size:10.5px}
.meta-list span:last-child{font-weight:600;text-align:right}

/* ---------- ARNÉS (firma visual) ---------- */
.harness{margin:44px 0 0;border:1.5px solid var(--tinta);background:var(--papel-2);padding:0;overflow:hidden}
.harness-head{padding:14px 20px;border-bottom:1.5px solid var(--tinta);display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;background:var(--papel)}
.harness-head b{font-family:var(--display);font-size:15px;font-weight:600}
.harness-head em{font-family:var(--mono);font-size:10.5px;font-style:normal;letter-spacing:.12em;text-transform:uppercase;color:var(--tinta-2)}
.capas{display:grid;grid-template-columns:repeat(3,1fr)}
@media(max-width:720px){.capas{grid-template-columns:1fr}}
.capa{padding:24px 20px;border-right:1px solid var(--linea-fuerte);position:relative}
.capa:last-child{border-right:none}
@media(max-width:720px){.capa{border-right:none;border-bottom:1px solid var(--linea-fuerte)}.capa:last-child{border-bottom:none}}
.capa i{font-family:var(--mono);font-style:normal;font-size:10px;letter-spacing:.16em;color:var(--tinta-2)}
.capa b{display:block;font-family:var(--display);font-size:19px;font-weight:600;margin:7px 0 5px;letter-spacing:-.02em}
.capa p{font-size:14.5px;line-height:1.5;color:var(--tinta-2)}
.capa:nth-child(3){background:linear-gradient(180deg,rgba(138,75,42,.09),rgba(138,75,42,.02))}
.capa:nth-child(3) b{color:var(--cuero)}

/* ---------- TARJETAS ---------- */
.grid{display:grid;gap:1.5px;background:var(--tinta);border:1.5px solid var(--tinta);margin-top:8px}
.g2{grid-template-columns:repeat(2,1fr)}
.g3{grid-template-columns:repeat(3,1fr)}
@media(max-width:900px){.g3{grid-template-columns:repeat(2,1fr)}}
@media(max-width:640px){.g2,.g3{grid-template-columns:1fr}}
.card{background:var(--papel);padding:26px 24px}
.card.hl{background:var(--papel-2)}

/* ---------- SESIONES: índice ---------- */
.ses-list{border-top:1.5px solid var(--tinta);margin-top:26px}
.ses-row{
  display:grid;grid-template-columns:64px 1fr auto;gap:22px;align-items:center;
  padding:20px 6px;border-bottom:1px solid var(--linea-fuerte);
  cursor:pointer;background:none;border-left:none;border-right:none;border-top:none;
  width:100%;text-align:left;font:inherit;color:inherit;transition:.16s;
}
.ses-row:hover{background:rgba(138,75,42,.06);padding-left:14px}
.ses-num{font-family:var(--display);font-weight:800;font-size:34px;letter-spacing:-.05em;color:var(--linea-fuerte);line-height:1}
.ses-row:hover .ses-num{color:var(--cuero)}
.ses-t{font-family:var(--display);font-weight:600;font-size:20px;letter-spacing:-.02em;margin-bottom:3px}
.ses-d{font-size:15px;color:var(--tinta-2);line-height:1.45}
.ses-f{font-family:var(--mono);font-size:11px;color:var(--tinta-2);white-space:nowrap;text-align:right}
@media(max-width:640px){
  .ses-row{grid-template-columns:44px 1fr;gap:14px}
  .ses-num{font-size:26px}.ses-f{grid-column:2;text-align:left;margin-top:4px}
}

/* ---------- DETALLE DE SESIÓN ---------- */
.back{font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;background:none;border:none;color:var(--cuero);cursor:pointer;padding:6px 0;margin-bottom:22px}
.back:hover{text-decoration:underline}
.det-head{border-bottom:1.5px solid var(--tinta);padding-bottom:26px;margin-bottom:34px}
.det-cols{display:grid;grid-template-columns:1fr 320px;gap:52px;align-items:start}
@media(max-width:900px){.det-cols{grid-template-columns:1fr;gap:34px}}
.prose p{margin-bottom:15px;max-width:66ch}
.side-box{border:1.5px solid var(--tinta);padding:20px;margin-bottom:20px;background:var(--papel-2)}
.side-box h4{font-family:var(--mono);font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;margin-bottom:12px;color:var(--cuero);font-weight:600}
.chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{font-family:var(--mono);font-size:10.5px;padding:4px 9px;border:1px solid var(--linea-fuerte);background:var(--papel);letter-spacing:.03em}
.conc{border-left:2px solid var(--cuero);padding-left:14px;margin-bottom:14px}
.conc b{font-family:var(--display);font-size:15.5px;display:block;margin-bottom:2px}
.conc span{font-size:14px;color:var(--tinta-2);line-height:1.45}
ul.tick{list-style:none}
ul.tick li{position:relative;padding-left:20px;margin-bottom:9px;font-size:15.5px;line-height:1.5}
ul.tick li::before{content:'▸';position:absolute;left:0;color:var(--cuero);font-size:13px;top:1px}

/* ---------- PENDIENTES ---------- */
.pend{display:flex;gap:12px;align-items:flex-start;padding:12px 0;border-bottom:1px solid var(--linea)}
.pend:last-child{border-bottom:none}
.dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;margin-top:8px;border:1.5px solid var(--tinta)}
.dot.abierto{background:var(--cuero)}
.dot.cerrado{background:var(--verde);border-color:var(--verde)}
.pend-who{font-family:var(--mono);font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--tinta-2);display:block;margin-bottom:2px}
.pend-what{font-size:15.5px;line-height:1.45}
.pend.done .pend-what{color:var(--tinta-2);text-decoration:line-through;text-decoration-thickness:1px}

/* ---------- CRONOGRAMA ---------- */
.crono{border-top:1.5px solid var(--tinta);margin-top:26px}
.crono-item{display:grid;grid-template-columns:150px 1fr;gap:28px;padding:26px 0;border-bottom:1px solid var(--linea-fuerte)}
@media(max-width:700px){.crono-item{grid-template-columns:1fr;gap:10px}}
.crono-fecha{font-family:var(--mono);font-size:12px;line-height:1.7}
.crono-fecha b{display:block;font-family:var(--display);font-size:15px;font-weight:600;letter-spacing:-.01em}
.badge{display:inline-block;font-family:var(--mono);font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;padding:3px 8px;border:1px solid currentColor;margin-top:8px}
.badge.confirmada{color:var(--verde)}
.badge.propuesta{color:var(--latón)}
.enc{font-family:var(--mono);font-size:11.5px;color:var(--cuero);letter-spacing:.04em;margin-bottom:10px}

/* ---------- BACKLOG ---------- */
.filtros{display:flex;gap:8px;flex-wrap:wrap;margin:26px 0 20px;padding-bottom:18px;border-bottom:1px solid var(--linea-fuerte)}
.filtro{font-family:var(--mono);font-size:10.5px;letter-spacing:.11em;text-transform:uppercase;padding:6px 13px;border:1.5px solid var(--tinta);background:var(--papel);cursor:pointer;transition:.15s}
.filtro:hover{background:var(--papel-2)}
.filtro.on{background:var(--tinta);color:var(--papel)}
.bk{display:grid;grid-template-columns:1fr auto;gap:20px;padding:18px 0;border-bottom:1px solid var(--linea)}
@media(max-width:640px){.bk{grid-template-columns:1fr;gap:8px}}
.bk h3{font-size:18px;margin-bottom:4px}
.bk .nota{font-size:14.5px;color:var(--tinta-2);line-height:1.45}
.prio{font-family:var(--mono);font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;padding:4px 9px;height:fit-content;white-space:nowrap;border:1px solid currentColor}
.prio.alta{color:var(--cuero);background:rgba(138,75,42,.08)}
.prio.media{color:var(--latón)}
.prio.baja{color:var(--tinta-2)}

/* ---------- PARTICIPANTES ---------- */
.p-card{background:var(--papel);padding:26px 24px;display:flex;flex-direction:column}
.p-card h3{margin-bottom:2px}
.p-rol{font-family:var(--mono);font-size:10.5px;letter-spacing:.11em;text-transform:uppercase;color:var(--cuero);margin-bottom:3px}
.p-campo{font-size:13.5px;color:var(--tinta-2);font-style:italic;margin-bottom:13px;padding-bottom:13px;border-bottom:1px solid var(--linea)}
.p-bio{font-size:15px;line-height:1.55;flex:1;margin-bottom:15px}
.p-desde{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--tinta-2);margin-top:auto;padding-top:12px;border-top:1px dotted var(--linea-fuerte)}

/* ---------- STATS ---------- */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:1.5px;background:var(--tinta);border:1.5px solid var(--tinta);margin:34px 0}
@media(max-width:640px){.stats{grid-template-columns:repeat(2,1fr)}}
.stat{background:var(--papel);padding:20px}
.stat b{display:block;font-family:var(--display);font-weight:800;font-size:40px;line-height:1;letter-spacing:-.05em}
.stat span{font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--tinta-2);display:block;margin-top:6px}

footer{border-top:1.5px solid var(--tinta);padding:30px 0;font-family:var(--mono);font-size:11px;color:var(--tinta-2);display:flex;justify-content:space-between;gap:16px;flex-wrap:wrap}
.sect{margin-top:56px}
</style>
</head>
<body>

        ${s.conceptos.map(c=>`<div class="conc"><b>${esc(c.t)}</b><span>${esc(c.d)}</span></div>`).join('')}
      </div>`:''}

      ${s.decisiones.length ? `<div style="margin-top:34px">
        <div class="eyebrow">Decisiones</div>
        <ul class="tick">${s.decisiones.map(d=>`<li>${esc(d)}</li>`).join('')}</ul>
      </div>`:''}

      ${s.pendientes.length ? `<div style="margin-top:34px">
        <div class="eyebrow">Pendientes</div>
        ${s.pendientes.map(p=>`<div class="pend ${p.estado==='cerrado'?'done':''}">
          <span class="dot ${p.estado}"></span>
          <span><span class="pend-who">${esc(p.quien)}</span><span class="pend-what">${esc(p.que)}</span></span>
        </div>`).join('')}
      </div>`:''}
    </div>

    <aside>
      ${s.temas.length ? `<div class="side-box"><h4>Temas</h4>
        <div class="chips">${s.temas.map(t=>`<span class="chip">${esc(t)}</span>`).join('')}</div></div>`:''}

      ${s.nuevos?.length ? `<div class="side-box"><h4>Se incorporaron</h4>
        <ul class="tick">${s.nuevos.map(x=>`<li>${esc(x)}</li>`).join('')}</ul></div>`:''}

      ${s.referencias.length ? `<div class="side-box"><h4>Referencias</h4>
        ${s.referencias.map(r=>`<div style="margin-bottom:13px">
          <div style="font-family:var(--display);font-size:15px;font-weight:600;line-height:1.3">${r.url?`<a href="${esc(r.url)}" style="color:var(--cuero)">${esc(r.titulo)}</a>`:esc(r.titulo)}</div>
          <div style="font-size:13.5px;color:var(--tinta-2);line-height:1.4">${esc(r.nota)}</div>
        </div>`).join('')}</div>`:''}

      <div class="side-box"><h4>Navegación</h4>
        ${prev?`<div style="margin-bottom:9px"><button class="back" style="margin:0" onclick="abrir(${prev.n})">← ${esc(prev.titulo)}</button></div>`:''}
        ${next?`<div><button class="back" style="margin:0" onclick="abrir(${next.n})">${esc(next.titulo)} →</button></div>`:''}

}

let filtroPrio = 'todas';
function pintarBacklog(){
  const items = filtroPrio==='todas' ? BACKLOG : BACKLOG.filter(b=>b.prioridad===filtroPrio);
  $('#bk-lista').innerHTML = items.map(b=>`<div class="bk">
    <div><h3>${esc(b.titulo)}</h3>
      <div class="nota">${esc(b.nota)}</div>
      <div style="font-family:var(--mono);font-size:11px;color:var(--cuero);margin-top:6px">${esc(b.proponente)}</div>
    </div>
    <span class="prio ${b.prioridad}">${b.prioridad}</span>
  </div>`).join('');
  document.querySelectorAll('.filtro').forEach(f=>f.classList.toggle('on',f.dataset.p===filtroPrio));
}
function filtrar(p){ filtroPrio=p; pintarBacklog(); }
