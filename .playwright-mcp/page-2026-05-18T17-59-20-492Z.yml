        - paragraph [ref=e410]: Dharma Studio existe desde 2016 en una casa porfiriana en la Roma Norte. Cuatro habitaciones, doce artistas residentes, una biblioteca de referencia que crece como musgo. Funcionamos por cita, en jornadas largas, sin música alta.
        - paragraph [ref=e411]: Creemos en el tatuaje como práctica devocional — más cerca de la copia de un manuscrito iluminado que del consumo desechable. Cada artista trabaja en una sola disciplina, durante muchos años, hasta volverse un instrumento limpio.
