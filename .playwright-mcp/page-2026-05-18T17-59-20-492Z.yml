      - generic [ref=e130]:
        - paragraph [ref=e131]: Dharma Studio fue fundado en 2016 como un acto de resistencia contra la prisa. Aquí no hay flash, ni walk-ins, ni mañanas ruidosas. Solo consultas largas, cafés amargos, y un compromiso obsesivo con la línea.
        - paragraph [ref=e132]: Trabajamos en blackwork, linework fino, dotwork ceremonial y geometría sagrada. Cada pieza inicia con una conversación — la tuya, no la nuestra. Tu cuerpo es el manuscrito; nosotros somos copistas.
    - generic [ref=e133]:
